<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verb Runner – Graffiti Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            padding: 10px;
        }
        .container {
            background: linear-gradient(145deg, #ff006e, #8338ec, #3a86ff);
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 60px rgba(255,0,110,0.5);
            max-width: 700px;
            width: 100%;
            border: 4px solid #ffbe0b;
        }
        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }
        #startScreen h1 {
            color: #ffbe0b;
            font-size: 2.6rem;
            text-shadow: 0 0 20px #ff006e, 0 0 40px #8338ec, 3px 3px 0 #000;
            letter-spacing: 3px;
            text-align: center;
            font-weight: 900;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #fff;
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 6px 20px;
            border-radius: 30px;
            border: 2px solid #ffbe0b;
            margin-top: -10px;
            font-weight: bold;
        }
        .char-select {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin: 8px 0;
        }
        .char-card {
            background: linear-gradient(145deg, #ff006e, #8338ec);
            border-radius: 30px;
            padding: 18px 10px 14px;
            width: 150px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.25s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }
        .char-card:hover {
            transform: scale(1.04);
            border-color: #ffbe0b;
        }
        .char-card.selected {
            border-color: #ffbe0b;
            background: linear-gradient(145deg, #fb5607, #ff006e);
            box-shadow: 0 0 30px #ffbe0b;
        }
        .char-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #fff;
            padding: 3px;
            border: 3px solid #ffbe0b;
        }
        .char-card .name {
            color: #fff;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 8px;
            text-shadow: 2px 2px 0 #000;
        }
        .char-card .suffix {
            color: #ffbe0b;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.6);
            padding: 4px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            font-weight: bold;
        }
        .speed-select {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 5px 0;
        }
        .speed-btn {
            background: linear-gradient(145deg, #3a86ff, #8338ec);
            border: 2px solid transparent;
            padding: 10px 28px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .speed-btn:hover {
            transform: scale(1.05);
        }
        .speed-btn.active {
            border-color: #ffbe0b;
            background: linear-gradient(145deg, #ff006e, #fb5607);
            box-shadow: 0 0 20px #ffbe0b;
        }
        #startBtn {
            background: linear-gradient(145deg, #ffbe0b, #fb5607);
            border: none;
            padding: 16px 60px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 0 #c77600, 0 0 30px #ffbe0b;
            letter-spacing: 1px;
            margin-top: 8px;
            text-shadow: 1px 1px 0 #fff;
        }
        #startBtn:active {
            transform: translateY(8px);
            box-shadow: 0 0 20px #ffbe0b;
        }
        #startBtn:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c77600;
            pointer-events: none;
        }
        .controls-hint {
            color: #fff;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 30px;
            border: 2px solid #ffbe0b;
            font-weight: bold;
        }
        #gameScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0 8px;
        }
        .top-bar span {
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 30px;
            border: 2px solid #ffbe0b;
            backdrop-filter: blur(4px);
            text-shadow: 1px 1px 0 #000;
        }
        canvas {
            background: linear-gradient(180deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 600 / 500;
            touch-action: none;
            cursor: pointer;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 0 30px #ffbe0b;
            border: 3px solid #ffbe0b;
        }
        .game-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }
        .game-controls button {
            background: linear-gradient(145deg, #ff006e, #8338ec);
            border: none;
            padding: 8px 25px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            border: 2px solid #ffbe0b;
            transition: 0.2s;
        }
        .game-controls button:hover {
            background: linear-gradient(145deg, #fb5607, #ff006e);
        }
        #resultScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 30px 20px;
            text-align: center;
        }
        #resultScreen h2 {
            font-size: 3rem;
            text-shadow: 0 0 30px currentColor, 3px 3px 0 #000;
        }
        #resultScreen p {
            color: #fff;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.6);
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: bold;
        }
        #resultScreen button {
            background: linear-gradient(145deg, #ffbe0b, #fb5607);
            border: none;
            padding: 14px 50px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #c77600;
            text-shadow: 1px 1px 0 #fff;
        }
        #resultScreen button:active {
            transform: translateY(6px);
            box-shadow: none;
        }
        .win-title { color: #06ffa5; }
        @media (max-width: 600px) {
            .char-card { width: 120px; padding: 12px 6px; }
            .char-card img { width: 60px; height: 60px; }
            #startScreen h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="startScreen">
        <h1>🏃‍♂️ VERB RUNNER</h1>
        <div class="subtitle">Collect 10 coins with your verb endings!</div>
        <div class="char-select" id="charSelect">
            <div class="char-card" data-char="s">
                <img src="https://i.pinimg.com/1200x/ff/f0/2e/fff02eb11a310b7ac0fb88edf62393a1.jpg" alt="Tricky" loading="lazy">
                <div class="name">Tricky</div>
                <div class="suffix">+ s</div>
            </div>
            <div class="char-card" data-char="es">
                <img src="https://i.pinimg.com/736x/2d/32/62/2d326200b81ad9818a548109bb826227.jpg" alt="Jake" loading="lazy">
                <div class="name">Jake</div>
                <div class="suffix">+ es</div>
            </div>
            <div class="char-card" data-char="ies">
                <img src="https://i.pinimg.com/736x/af/e3/1b/afe31b1bf941ad426d1cac15c301f30f.jpg" alt="Fresh" loading="lazy">
                <div class="name">Fresh</div>
                <div class="suffix">+ ies</div>
            </div>
        </div>
        <div style="color:#fff; font-weight:bold; font-size:1.1rem; text-shadow: 2px 2px 0 #000;">Choose speed:</div>
        <div class="speed-select">
            <button class="speed-btn" data-speed="0.45">🐢 Slow</button>
            <button class="speed-btn active" data-speed="0.65">🐇 Medium</button>
            <button class="speed-btn" data-speed="0.85">🚀 Fast</button>
        </div>
        <button id="startBtn" disabled>▶ PLAY</button>
        <div class="controls-hint">⬅️ ➡️  or tap left/right side of screen</div>
    </div>

    <div id="gameScreen">
        <div class="top-bar">
            <span>🏆 <span id="scoreDisplay">0</span> / 10</span>
            <span>⚡ <span id="speedDisplay">Medium</span></span>
            <span id="charDisplay">👤 Tricky</span>
        </div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div class="game-controls">
            <button id="quitBtn">🚪 Quit</button>
        </div>
    </div>

    <div id="resultScreen">
        <h2 class="win-title">🎉 You Win!</h2>
        <p>Collected all 10 coins!</p>
        <button id="resultBtn">🔄 Play Again</button>
    </div>
</div>

<script>
    // ============================================================
    //  DATA
    // ============================================================
    const VERBS = {
        s: ['work','dance','read','play','die','lie','run','like','eat','sleep','drink','write','listen','take','stay','lay','enjoy','pay'],
        es: ['go','wash','watch','catch','do','teach','finish','pass','miss','kiss','fix','mix','buzz','reach','smash','confess','brush','scratch','crash'],
        ies: ['try','dry','study','fly','cry','carry','worry','copy','marry','hurry','apply','reply','supply','rely','fry']
    };
    const CHAR_NAMES = { s: 'Tricky', es: 'Jake', ies: 'Fresh' };
    const SPEED_NAMES = { 0.45: 'Slow', 0.65: 'Medium', 0.85: 'Fast' };
    const WIN_SCORE = 10;

    // ============================================================
    //  STATE
    // ============================================================
    let selectedChar = null;
    let selectedSpeed = 0.65;
    let gameRunning = false;
    let score = 0;

    let player = { lane: 1, x: 0, y: 0, width: 44, height: 56 };
    let coins = [];
    let obstacles = [];
    let frameId = null;
    let spawnCounter = 0;
    const LANE_COUNT = 3;
    const LANE_WIDTH = 200;
    const COIN_SIZE = 64;
    const OBSTACLE_WIDTH = 50;
    const OBSTACLE_HEIGHT = 50;
    const PLAYER_Y_OFFSET = 420;
    // Увеличили минимальное расстояние между объектами на одной дорожке
    const MIN_DIST_BETWEEN_OBJECTS = 250;

    // Увеличили интервалы спавна (объекты появляются реже)
    const MIN_SPAWN_INTERVAL = 200;
    const MAX_SPAWN_INTERVAL = 450;
    let nextSpawnInterval = 300;
    const COIN_PROBABILITY = 0.75;

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const charDisplay = document.getElementById('charDisplay');
    const startBtn = document.getElementById('startBtn');
    const quitBtn = document.getElementById('quitBtn');
    const resultBtn = document.getElementById('resultBtn');

    // ============================================================
    //  SELECTION
    // ============================================================
    const charCards = document.querySelectorAll('.char-card');
    const speedBtns = document.querySelectorAll('.speed-btn');

    charCards.forEach(card => {
        card.addEventListener('click', () => {
            charCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedChar = card.dataset.char;
            startBtn.disabled = false;
        });
    });

    speedBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            speedBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSpeed = parseFloat(btn.dataset.speed);
        });
    });

    // ============================================================
    //  GAME FUNCTIONS
    // ============================================================
    function getLaneX(lane) {
        return lane * LANE_WIDTH + (LANE_WIDTH - player.width) / 2;
    }

    function isTooClose(lane, yPos, objects) {
        for (let obj of objects) {
            if (obj.lane === lane && Math.abs(obj.y - yPos) < MIN_DIST_BETWEEN_OBJECTS) {
                return true;
            }
        }
        return false;
    }

    function spawnCoinOnLane(lane, yOffset = 0) {
        const types = ['s', 'es', 'ies'];
        const type = types[Math.floor(Math.random() * types.length)];
        const wordList = VERBS[type];
        const word = wordList[Math.floor(Math.random() * wordList.length)];
        const x = lane * LANE_WIDTH + (LANE_WIDTH - COIN_SIZE) / 2;
        const yPos = -COIN_SIZE - yOffset;
        coins.push({
            x, y: yPos, lane, type, word,
            size: COIN_SIZE, active: true
        });
    }

    function spawnMultipleCoins() {
        const lanes = [0, 1, 2];
        const shuffled = lanes.sort(() => Math.random() - 0.5);
        // Вероятность 2-х монет снижена до 30%
        const count = Math.random() < 0.3 ? 2 : 1;
        const selectedLanes = shuffled.slice(0, count);
        for (let idx = 0; idx < selectedLanes.length; idx++) {
            const lane = selectedLanes[idx];
            // Увеличили вертикальный разброс между монетами
            const yOffset = idx * 80 + Math.random() * 60;
            spawnCoinOnLane(lane, yOffset);
        }
    }

    function spawnObstacle() {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const x = lane * LANE_WIDTH + (LANE_WIDTH - OBSTACLE_WIDTH) / 2;
        const yPos = -OBSTACLE_HEIGHT;
        if (isTooClose(lane, yPos, coins) || isTooClose(lane, yPos, obstacles)) {
            for (let altLane = 0; altLane < LANE_COUNT; altLane++) {
                if (altLane !== lane && !isTooClose(altLane, yPos, coins) && !isTooClose(altLane, yPos, obstacles)) {
                    const altX = altLane * LANE_WIDTH + (LANE_WIDTH - OBSTACLE_WIDTH) / 2;
                    obstacles.push({
                        x: altX, y: yPos, lane: altLane,
                        width: OBSTACLE_WIDTH, height: OBSTACLE_HEIGHT,
                        active: true
                    });
                    return;
                }
            }
            return;
        }
        obstacles.push({
            x, y: yPos, lane,
            width: OBSTACLE_WIDTH, height: OBSTACLE_HEIGHT,
            active: true
        });
    }

    function rectCollide(r1, r2) {
        return r1.x < r2.x + r2.width &&
               r1.x + r1.width > r2.x &&
               r1.y < r2.y + r2.height &&
               r1.y + r1.height > r2.y;
    }

    function startGame() {
        startScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
        resultScreen.style.display = 'none';

        score = 0;
        coins = [];
        obstacles = [];
        spawnCounter = 0;
        nextSpawnInterval = 300;
        player.lane = 1;
        player.x = getLaneX(1);
        player.y = PLAYER_Y_OFFSET;
        gameRunning = true;

        scoreDisplay.textContent = score;
        speedDisplay.textContent = SPEED_NAMES[selectedSpeed] || 'Medium';
        charDisplay.textContent = '👤 ' + CHAR_NAMES[selectedChar];

        if (frameId) cancelAnimationFrame(frameId);
        gameLoop();
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        frameId = requestAnimationFrame(gameLoop);
    }

    function update() {
        spawnCounter++;
        if (spawnCounter >= nextSpawnInterval) {
            spawnCounter = 0;
            nextSpawnInterval = Math.floor(Math.random() * (MAX_SPAWN_INTERVAL - MIN_SPAWN_INTERVAL + 1)) + MIN_SPAWN_INTERVAL;

            if (Math.random() < COIN_PROBABILITY) {
                spawnMultipleCoins();
            } else {
                spawnObstacle();
            }
        }

        // Движение монет
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            coin.y += selectedSpeed;
            if (coin.active) {
                const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                const coinRect = { x: coin.x, y: coin.y, width: coin.size, height: coin.size };
                if (rectCollide(playerRect, coinRect)) {
                    coin.active = false;
                    if (coin.type === selectedChar) {
                        score++;
                        scoreDisplay.textContent = score;
                        if (score >= WIN_SCORE) {
                            gameRunning = false;
                            showWin();
                            return;
                        }
                    }
                    coins.splice(i, 1);
                    continue;
                }
            }
            if (coin.y > canvas.height + 50) {
                coins.splice(i, 1);
            }
        }

        // Движение препятствий
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const ob = obstacles[i];
            ob.y += selectedSpeed;
            if (ob.active) {
                const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                const obRect = { x: ob.x, y: ob.y, width: ob.width, height: ob.height };
                if (rectCollide(playerRect, obRect)) {
                    if (score > 0) {
                        score--;
                        scoreDisplay.textContent = score;
                    }
                    obstacles.splice(i, 1);
                    continue;
                }
            }
            if (ob.y > canvas.height + 50) {
                obstacles.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#ff006e');
        gradient.addColorStop(0.3, '#8338ec');
        gradient.addColorStop(0.6, '#3a86ff');
        gradient.addColorStop(1, '#06ffa5');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const time = performance.now() * 0.001;
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ff006e';
        for (let i = 0; i < 5; i++) {
            const x = (i * 150 + time * 20) % (canvas.width + 100) - 50;
            const y = 100 + Math.sin(time + i) * 30;
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#ffbe0b';
        for (let i = 0; i < 4; i++) {
            const x = 100 + i * 150;
            const y = (i * 120 + time * 30) % (canvas.height + 100) - 50;
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.strokeStyle = '#ffbe0b88';
        ctx.lineWidth = 3;
        for (let i = 0; i < 15; i++) {
            const y = (i * 40 + performance.now() * 0.1 * selectedSpeed * 10) % canvas.height;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y + 50);
            ctx.stroke();
        }

        for (let i = 0; i < LANE_COUNT; i++) {
            const x = i * LANE_WIDTH;
            ctx.strokeStyle = '#ffbe0b';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#ffbe0b';
            ctx.shadowBlur = 15;
            ctx.strokeRect(x, 0, LANE_WIDTH, canvas.height);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.fillRect(x + LANE_WIDTH/2 - 3, y, 6, 25);
            }
        }

        obstacles.forEach(ob => {
            const x = ob.x, y = ob.y, w = ob.width, h = ob.height;
            ctx.shadowColor = '#ff006e';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#ff006e';
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#ffbe0b';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚠️', x + w/2, y + h/2 + 2);
        });

        coins.forEach(coin => {
            const x = coin.x, y = coin.y, size = coin.size;
            ctx.shadowColor = '#ffbe0b';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
            ctx.fillStyle = '#ffbe0b';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#fb5607';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const word = coin.word.length > 8 ? coin.word.slice(0,7)+'…' : coin.word;
            ctx.fillText(word, x + size/2, y + size/2 + 1);
        });

        const px = player.x, py = player.y;
        ctx.shadowColor = '#06ffa5';
        ctx.shadowBlur = 35;
        ctx.fillStyle = '#06ffa5';
        ctx.beginPath();
        ctx.roundRect(px, py, player.width, player.height, 12);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ffbe0b';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.font = '36px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let emoji = '🏃';
        if (selectedChar === 's') emoji = '🦊';
        else if (selectedChar === 'es') emoji = '🐺';
        else if (selectedChar === 'ies') emoji = '🐱';
        ctx.fillText(emoji, px + player.width/2, py + player.height/2 - 2);

        ctx.fillStyle = '#ffbe0b';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 5;
        ctx.fillText(CHAR_NAMES[selectedChar], px + player.width/2, py - 4);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 5;
        ctx.fillText('Goal: ' + score + '/' + WIN_SCORE, canvas.width - 15, 12);
        ctx.shadowBlur = 0;
    }

    function showWin() {
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'flex';
        if (frameId) cancelAnimationFrame(frameId);
    }

    // ============================================================
    //  CONTROLS
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (!gameRunning) return;
        if (e.key === 'ArrowLeft' && player.lane > 0) {
            player.lane--;
            player.x = getLaneX(player.lane);
            e.preventDefault();
        } else if (e.key === 'ArrowRight' && player.lane < LANE_COUNT - 1) {
            player.lane++;
            player.x = getLaneX(player.lane);
            e.preventDefault();
        }
    });

    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        touchStartX = (touch.clientX - rect.left) / rect.width * canvas.width;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const currentX = (touch.clientX - rect.left) / rect.width * canvas.width;
        const diff = currentX - touchStartX;
        if (Math.abs(diff) > 30) {
            if (diff > 0 && player.lane < LANE_COUNT - 1) {
                player.lane++;
                player.x = getLaneX(player.lane);
                touchStartX = currentX;
            } else if (diff < 0 && player.lane > 0) {
                player.lane--;
                player.x = getLaneX(player.lane);
                touchStartX = currentX;
            }
        }
    }, { passive: false });

    function handleTap(e) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        let clientX;
        if (e.touches) {
            e.preventDefault();
            clientX = e.touches[0].clientX;
        } else {
            clientX = e.clientX;
        }
        const x = (clientX - rect.left) / rect.width * canvas.width;
        if (x < canvas.width / 2) {
            if (player.lane > 0) {
                player.lane--;
                player.x = getLaneX(player.lane);
            }
        } else {
            if (player.lane < LANE_COUNT - 1) {
                player.lane++;
                player.x = getLaneX(player.lane);
            }
        }
    }

    canvas.addEventListener('click', handleTap);
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            canvas._tapStartTime = Date.now();
            canvas._tapStartX = e.touches[0].clientX;
        }
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
        if (!gameRunning) return;
        if (canvas._tapStartTime && Date.now() - canvas._tapStartTime < 300) {
            const touch = e.changedTouches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) / rect.width * canvas.width;
            if (x < canvas.width / 2) {
                if (player.lane > 0) {
                    player.lane--;
                    player.x = getLaneX(player.lane);
                }
            } else {
                if (player.lane < LANE_COUNT - 1) {
                    player.lane++;
                    player.x = getLaneX(player.lane);
                }
            }
        }
        canvas._tapStartTime = null;
    }, { passive: true });

    quitBtn.addEventListener('click', () => {
        gameRunning = false;
        if (frameId) cancelAnimationFrame(frameId);
        gameScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        charCards.forEach(c => c.classList.remove('selected'));
        startBtn.disabled = true;
        selectedChar = null;
    });

    resultBtn.addEventListener('click', () => {
        resultScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        charCards.forEach(c => c.classList.remove('selected'));
        startBtn.disabled = true;
        selectedChar = null;
        speedBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.speed-btn[data-speed="0.65"]').classList.add('active');
        selectedSpeed = 0.65;
    });

    startBtn.addEventListener('click', startGame);

    // ============================================================
    //  INIT
    // ============================================================
    document.querySelector('.speed-btn[data-speed="0.65"]').classList.add('active');
    selectedSpeed = 0.65;

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };
    }
</script>
</body>
</html>
