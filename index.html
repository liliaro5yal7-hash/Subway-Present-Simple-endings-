<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verb Runner – Subway Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            padding: 10px;
        }
        .container {
            background: linear-gradient(145deg, #1b2a3a, #0f1a2a);
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            max-width: 700px;
            width: 100%;
            border: 3px solid #ffd70066;
        }
        /* СТАРТОВЫЙ ЭКРАН */
        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }
        #startScreen h1 {
            color: #ffd700;
            font-size: 2.6rem;
            text-shadow: 0 0 20px #ffa500, 0 0 40px #ff8c00;
            letter-spacing: 3px;
            text-align: center;
            font-weight: 900;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #88c0e0;
            font-size: 1rem;
            background: #1a2f3fcc;
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #ffd70055;
            margin-top: -10px;
        }
        .char-select {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin: 8px 0;
        }
        .char-card {
            background: linear-gradient(145deg, #2a4b5e, #1e3a4a);
            border-radius: 30px;
            padding: 18px 10px 14px;
            width: 150px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.25s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }
        .char-card:hover {
            transform: scale(1.04);
            border-color: #ffd700;
        }
        .char-card.selected {
            border-color: #ffd700;
            background: #2f5a70;
            box-shadow: 0 0 30px #ffd70066;
        }
        .char-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: #fff;
            padding: 3px;
            border: 2px solid #ffd700;
        }
        .char-card .name {
            color: #fff;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 8px;
            text-shadow: 0 0 8px #000;
        }
        .char-card .suffix {
            color: #ffd700;
            font-size: 1.1rem;
            background: #1a2f3f;
            padding: 4px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            font-weight: bold;
        }
        .speed-select {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 5px 0;
        }
        .speed-btn {
            background: linear-gradient(145deg, #2a4b5e, #1a3a4a);
            border: 2px solid transparent;
            padding: 10px 28px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .speed-btn:hover {
            transform: scale(1.05);
        }
        .speed-btn.active {
            border-color: #ffd700;
            background: #3a6a80;
            box-shadow: 0 0 20px #ffd70077;
        }
        #startBtn {
            background: linear-gradient(145deg, #ffd700, #f0b800);
            border: none;
            padding: 16px 60px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #1a2f3f;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 0 #b38f00, 0 0 30px #ffd70055;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        #startBtn:active {
            transform: translateY(8px);
            box-shadow: 0 0 20px #ffd70077;
        }
        #startBtn:disabled {
            opacity: 0.4;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b38f00;
            pointer-events: none;
        }
        .controls-hint {
            color: #88c0e0;
            font-size: 0.85rem;
            background: #0f1a2acc;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #ffd70044;
        }

        /* ИГРОВОЙ ЭКРАН */
        #gameScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0 8px;
        }
        .top-bar span {
            background: #1a2f3fcc;
            padding: 6px 18px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            backdrop-filter: blur(4px);
        }
        canvas {
            background: #0b1a2e;
            border-radius: 24px;
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 600 / 500;
            touch-action: none;
            cursor: pointer;
            box-shadow: inset 0 0 40px #00000099, 0 0 30px #ffd70033;
            border: 2px solid #ffd70066;
        }
        .game-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }
        .game-controls button {
            background: #2a4b5e;
            border: none;
            padding: 8px 25px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            border: 2px solid #ffd70066;
            transition: 0.2s;
            background: #1a3a4a;
        }
        .game-controls button:hover {
            background: #3a6a80;
        }

        /* ЭКРАН ПОБЕДЫ / ПРОИГРЫША */
        #resultScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 30px 20px;
            text-align: center;
        }
        #resultScreen h2 {
            font-size: 3rem;
            text-shadow: 0 0 30px currentColor;
        }
        #resultScreen p {
            color: #fff;
            font-size: 1.4rem;
            background: #1a2f3fcc;
            padding: 10px 30px;
            border-radius: 40px;
        }
        #resultScreen button {
            background: #ffd700;
            border: none;
            padding: 14px 50px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a2f3f;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #b38f00;
        }
        #resultScreen button:active {
            transform: translateY(6px);
            box-shadow: none;
        }
        .win-title { color: #2ecc71; }
        .lose-title { color: #e74c3c; }
        @media (max-width: 600px) {
            .char-card { width: 120px; padding: 12px 6px; }
            .char-card img { width: 60px; height: 60px; }
            #startScreen h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- СТАРТОВЫЙ ЭКРАН -->
    <div id="startScreen">
        <h1>🏃‍♂️ VERB RUNNER</h1>
        <div class="subtitle">Collect 10 coins with your verb endings!</div>
        <div class="char-select" id="charSelect">
            <!-- Tricky -->
            <div class="char-card" data-char="s">
                <img src="https://i.pinimg.com/1200x/ff/f0/2e/fff02eb11a310b7ac0fb88edf62393a1.jpg" alt="Tricky" loading="lazy">
                <div class="name">Tricky</div>
                <div class="suffix">+ s</div>
            </div>
            <!-- Jake -->
            <div class="char-card" data-char="es">
                <img src="https://i.pinimg.com/736x/2d/32/62/2d326200b81ad9818a548109bb826227.jpg" alt="Jake" loading="lazy">
                <div class="name">Jake</div>
                <div class="suffix">+ es</div>
            </div>
            <!-- Fresh -->
            <div class="char-card" data-char="ies">
                <img src="https://i.pinimg.com/736x/af/e3/1b/afe31b1bf941ad426d1cac15c301f30f.jpg" alt="Fresh" loading="lazy">
                <div class="name">Fresh</div>
                <div class="suffix">+ ies</div>
            </div>
        </div>
        <div style="color:#fff; font-weight:bold; font-size:1.1rem;">Choose speed:</div>
        <div class="speed-select">
            <button class="speed-btn" data-speed="1">🐢 Slow</button>
            <button class="speed-btn active" data-speed="2">🐇 Medium</button>
            <button class="speed-btn" data-speed="3">🚀 Fast</button>
        </div>
        <button id="startBtn" disabled>▶ PLAY</button>
        <div class="controls-hint">⬅️ ➡️  or swipe to move</div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gameScreen">
        <div class="top-bar">
            <span>🏆 <span id="scoreDisplay">0</span> / 10</span>
            <span>⚡ <span id="speedDisplay">Medium</span></span>
            <span id="charDisplay">👤 Tricky</span>
        </div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div class="game-controls">
            <button id="quitBtn">🚪 Quit</button>
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТА (победа/поражение) -->
    <div id="resultScreen">
        <h2 id="resultTitle">🎉 You Win!</h2>
        <p id="resultMsg">Collected 10 coins!</p>
        <button id="resultBtn">🔄 Play Again</button>
    </div>
</div>

<script>
    // ============================================================
    //  DATA
    // ============================================================
    const VERBS = {
        s: ['work','dance','read','play','die','lie','run','like','eat','sleep','drink','write','listen','take','stay','lay','enjoy','pay'],
        es: ['go','wash','watch','catch','do','teach','finish','pass','miss','kiss','fix','mix','buzz','reach','smash','confess','brush','scratch','crash'],
        ies: ['try','dry','study','fly','cry','carry','worry','copy','marry','hurry','apply','reply','supply','rely','fry']
    };
    const CHAR_NAMES = { s: 'Tricky', es: 'Jake', ies: 'Fresh' };
    const SPEED_NAMES = { 1: 'Slow', 2: 'Medium', 3: 'Fast' };
    const WIN_SCORE = 10;

    // ============================================================
    //  STATE
    // ============================================================
    let selectedChar = null;       // 's', 'es', 'ies'
    let selectedSpeed = 2;        // pixels per frame (slow 1, medium 2, fast 3)
    let gameRunning = false;
    let score = 0;
    let lives = 1; // 1 life, collision = game over

    // Game objects
    let player = { lane: 1, x: 0, y: 0, width: 44, height: 56 };
    let coins = [];
    let obstacles = [];
    let frameId = null;
    let spawnCounter = 0;
    let obstacleSpawnCounter = 0;
    const LANE_COUNT = 3;
    const LANE_WIDTH = 200; // 600/3
    const COIN_SIZE = 64;   // larger
    const OBSTACLE_WIDTH = 50;
    const OBSTACLE_HEIGHT = 50;
    const PLAYER_Y_OFFSET = 420; // from top

    // DOM
    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const resultScreen = document.getElementById('resultScreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const charDisplay = document.getElementById('charDisplay');
    const startBtn = document.getElementById('startBtn');
    const quitBtn = document.getElementById('quitBtn');
    const resultTitle = document.getElementById('resultTitle');
    const resultMsg = document.getElementById('resultMsg');
    const resultBtn = document.getElementById('resultBtn');

    // ============================================================
    //  SELECTION
    // ============================================================
    const charCards = document.querySelectorAll('.char-card');
    const speedBtns = document.querySelectorAll('.speed-btn');

    charCards.forEach(card => {
        card.addEventListener('click', () => {
            charCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedChar = card.dataset.char;
            startBtn.disabled = false;
        });
    });

    speedBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            speedBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSpeed = parseInt(btn.dataset.speed);
        });
    });

    // ============================================================
    //  GAME FUNCTIONS
    // ============================================================
    function getLaneX(lane) {
        return lane * LANE_WIDTH + (LANE_WIDTH - player.width) / 2;
    }

    function spawnCoin() {
        // pick a random verb type
        const types = ['s', 'es', 'ies'];
        const type = types[Math.floor(Math.random() * types.length)];
        const wordList = VERBS[type];
        const word = wordList[Math.floor(Math.random() * wordList.length)];
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const x = lane * LANE_WIDTH + (LANE_WIDTH - COIN_SIZE) / 2;
        coins.push({
            x: x,
            y: -COIN_SIZE,
            lane: lane,
            type: type,
            word: word,
            size: COIN_SIZE,
            active: true
        });
    }

    function spawnObstacle() {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const x = lane * LANE_WIDTH + (LANE_WIDTH - OBSTACLE_WIDTH) / 2;
        obstacles.push({
            x: x,
            y: -OBSTACLE_HEIGHT,
            lane: lane,
            width: OBSTACLE_WIDTH,
            height: OBSTACLE_HEIGHT,
            active: true
        });
    }

    function rectCollide(r1, r2) {
        return r1.x < r2.x + r2.width &&
               r1.x + r1.width > r2.x &&
               r1.y < r2.y + r2.height &&
               r1.y + r1.height > r2.y;
    }

    function startGame() {
        startScreen.style.display = 'none';
        gameScreen.style.display = 'flex';
        resultScreen.style.display = 'none';

        score = 0;
        coins = [];
        obstacles = [];
        spawnCounter = 0;
        obstacleSpawnCounter = 0;
        player.lane = 1;
        player.x = getLaneX(1);
        player.y = PLAYER_Y_OFFSET;
        gameRunning = true;

        scoreDisplay.textContent = score;
        speedDisplay.textContent = SPEED_NAMES[selectedSpeed] || 'Medium';
        charDisplay.textContent = '👤 ' + CHAR_NAMES[selectedChar];

        if (frameId) cancelAnimationFrame(frameId);
        gameLoop();
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        frameId = requestAnimationFrame(gameLoop);
    }

    function update() {
        // Spawn coins (interval depends on speed)
        const coinInterval = Math.max(20, 50 - selectedSpeed * 8);
        if (++spawnCounter >= coinInterval) {
            spawnCounter = 0;
            spawnCoin();
        }

        // Spawn obstacles (less frequent)
        const obstacleInterval = Math.max(40, 90 - selectedSpeed * 12);
        if (++obstacleSpawnCounter >= obstacleInterval) {
            obstacleSpawnCounter = 0;
            spawnObstacle();
        }

        // Move coins
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            coin.y += selectedSpeed;
            if (coin.active) {
                const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                const coinRect = { x: coin.x, y: coin.y, width: coin.size, height: coin.size };
                if (rectCollide(playerRect, coinRect)) {
                    coin.active = false;
                    if (coin.type === selectedChar) {
                        score++;
                        scoreDisplay.textContent = score;
                        if (score >= WIN_SCORE) {
                            gameRunning = false;
                            showResult(true);
                            return;
                        }
                    }
                    coins.splice(i, 1);
                    continue;
                }
            }
            if (coin.y > canvas.height + 50) {
                coins.splice(i, 1);
            }
        }

        // Move obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const ob = obstacles[i];
            ob.y += selectedSpeed;
            if (ob.active) {
                const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                const obRect = { x: ob.x, y: ob.y, width: ob.width, height: ob.height };
                if (rectCollide(playerRect, obRect)) {
                    // Game over
                    gameRunning = false;
                    showResult(false);
                    return;
                }
            }
            if (ob.y > canvas.height + 50) {
                obstacles.splice(i, 1);
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ---- Dynamic background (graffiti style) ----
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#0f1a2a');
        gradient.addColorStop(0.5, '#1a2f3f');
        gradient.addColorStop(1, '#2a4b5e');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Decorative lines (like speed lines)
        ctx.strokeStyle = '#ffd70022';
        ctx.lineWidth = 2;
        for (let i = 0; i < 20; i++) {
            const y = (i * 30 + performance.now() * 0.05 * selectedSpeed) % canvas.height;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y + 40);
            ctx.stroke();
        }

        // Lanes
        for (let i = 0; i < LANE_COUNT; i++) {
            const x = i * LANE_WIDTH;
            ctx.strokeStyle = '#ffffff33';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, 0, LANE_WIDTH, canvas.height);
            // Glowing edge
            ctx.shadowColor = '#ffd70022';
            ctx.shadowBlur = 10;
            ctx.strokeRect(x, 0, LANE_WIDTH, canvas.height);
            ctx.shadowBlur = 0;
            // dashed center
            ctx.fillStyle = '#ffffff22';
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.fillRect(x + LANE_WIDTH/2 - 2, y, 4, 25);
            }
        }

        // ---- Draw obstacles (spiky boxes) ----
        obstacles.forEach(ob => {
            const x = ob.x, y = ob.y, w = ob.width, h = ob.height;
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚠️', x + w/2, y + h/2 + 2);
        });

        // ---- Draw coins (all yellow) ----
        coins.forEach(coin => {
            const x = coin.x, y = coin.y, size = coin.size;
            // Glow
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#f39c12';
            ctx.lineWidth = 3;
            ctx.stroke();
            // Text (verb)
            ctx.fillStyle = '#1a2f3f';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const word = coin.word.length > 8 ? coin.word.slice(0,7)+'…' : coin.word;
            ctx.fillText(word, x + size/2, y + size/2 + 1);
        });

        // ---- Player ----
        const px = player.x, py = player.y;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 30;
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.roundRect(px, py, player.width, player.height, 12);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Emoji
        ctx.fillStyle = '#fff';
        ctx.font = '36px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        let emoji = '🏃';
        if (selectedChar === 's') emoji = '🦊';
        else if (selectedChar === 'es') emoji = '🐺';
        else if (selectedChar === 'ies') emoji = '🐱';
        ctx.fillText(emoji, px + player.width/2, py + player.height/2 - 2);

        // Name label
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(CHAR_NAMES[selectedChar], px + player.width/2, py - 4);

        // Score progress
        ctx.fillStyle = '#ffffffcc';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText('Goal: ' + score + '/' + WIN_SCORE, canvas.width - 15, 12);
    }

    // ============================================================
    //  RESULT SCREEN
    // ============================================================
    function showResult(win) {
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'flex';
        if (win) {
            resultTitle.className = 'win-title';
            resultTitle.textContent = '🎉 You Win!';
            resultMsg.textContent = 'Collected all 10 coins!';
        } else {
            resultTitle.className = 'lose-title';
            resultTitle.textContent = '💥 Game Over';
            resultMsg.textContent = 'Hit an obstacle! Try again.';
        }
        if (frameId) cancelAnimationFrame(frameId);
    }

    resultBtn.addEventListener('click', () => {
        resultScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        // Reset selection
        charCards.forEach(c => c.classList.remove('selected'));
        startBtn.disabled = true;
        selectedChar = null;
        // Reset speed to medium
        speedBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.speed-btn[data-speed="2"]').classList.add('active');
        selectedSpeed = 2;
    });

    // ============================================================
    //  CONTROLS
    // ============================================================
    document.addEventListener('keydown', (e) => {
        if (!gameRunning) return;
        if (e.key === 'ArrowLeft' && player.lane > 0) {
            player.lane--;
            player.x = getLaneX(player.lane);
            e.preventDefault();
        } else if (e.key === 'ArrowRight' && player.lane < LANE_COUNT - 1) {
            player.lane++;
            player.x = getLaneX(player.lane);
            e.preventDefault();
        }
    });

    // Touch swipes
    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        touchStartX = (touch.clientX - rect.left) / rect.width * canvas.width;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const currentX = (touch.clientX - rect.left) / rect.width * canvas.width;
        const diff = currentX - touchStartX;
        if (Math.abs(diff) > 30) {
            if (diff > 0 && player.lane < LANE_COUNT - 1) {
                player.lane++;
                player.x = getLaneX(player.lane);
                touchStartX = currentX;
            } else if (diff < 0 && player.lane > 0) {
                player.lane--;
                player.x = getLaneX(player.lane);
                touchStartX = currentX;
            }
        }
    }, { passive: false });

    // Quit
    quitBtn.addEventListener('click', () => {
        gameRunning = false;
        if (frameId) cancelAnimationFrame(frameId);
        gameScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        charCards.forEach(c => c.classList.remove('selected'));
        startBtn.disabled = true;
        selectedChar = null;
    });

    // Start button
    startBtn.addEventListener('click', startGame);

    // ============================================================
    //  INIT
    // ============================================================
    // Set default speed active
    document.querySelector('.speed-btn[data-speed="2"]').classList.add('active');
    selectedSpeed = 2;

    // Polyfill for roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };
    }
</script>
